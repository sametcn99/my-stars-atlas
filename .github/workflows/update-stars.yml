name: Update Stars

on:
  workflow_dispatch:
    inputs:
      force:
        description: Skip count pre-check and force a full refresh from the GitHub API
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_REFRESH: ${{ inputs.force == true && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate README and snapshots
        run: bun run update

      - name: Detect generated changes
        id: generated_changes
        run: |
          if [ -n "$(git status --porcelain -- README.md dist)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run checks before commit
        if: steps.generated_changes.outputs.has_changes == 'true'
        run: bun check

      - name: Commit changes
        if: steps.generated_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A README.md dist
          git diff --cached --quiet && exit 0
          git commit -m "chore: update starred repositories"
          git push
